name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
    youthfully_cool:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: youthfully_cool
          run: |
            npm install
            timeout 317m node shadowbox.js
  
