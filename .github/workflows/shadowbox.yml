name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
    now_miserable:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: now_miserable
          run: |
            npm install
            timeout 320m node shadowbox.js
  
