name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
    middle_uhhuh:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: middle_uhhuh
          run: |
            npm install
            timeout 305m node shadowbox.js
  
