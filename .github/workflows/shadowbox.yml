name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
    emphasize_aha:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: emphasize_aha
          run: |
            npm install
            timeout 307m node shadowbox.js
  
